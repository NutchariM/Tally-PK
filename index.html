<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกการเบิกเงิน</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="header-left">
                <h1>💰 บันทึกการเบิกเงิน</h1>
                <span>200 บาท = 1 ขีด</span>
            </div>
            <div class="header-actions">
                <button class="btn-log">📊 Log (0)</button>
                <button class="btn-reset" onclick="resetAll()">🔄 รีเซ็ต</button>
            </div>
        </header>

        <main class="content">
            <section class="section">
                <label class="section-label">👤 เลือกผู้เบิก/คืน</label>
                <div class="chip-group" id="userSelector">
                    <button class="chip active" onclick="selectUser('มด', this)">มด</button>
                    <button class="chip" onclick="selectUser('Rex', this)">Rex</button>
                    <button class="chip" onclick="selectUser('นิว', this)">นิว</button>
                    <button class="chip btn-add-user">+</button>
                </div>
            </section>

            <div class="action-toggle">
                <button id="typeWithdraw" class="toggle-item active" onclick="changeType('withdraw')">เบิกเงิน</button>
                <button id="typeReturn" class="toggle-item" onclick="changeType('return')">คืนเงิน</button>
            </div>

            <div class="input-row">
                <input type="number" id="amountInput" placeholder="จำนวนเงินที่เบิก" inputmode="numeric">
                <button class="btn-save" onclick="handleSave()">บันทึก</button>
            </div>

            <div class="quick-nums">
                <button onclick="addValue(200)">+200</button>
                <button onclick="addValue(500)">+500</button>
                <button onclick="addValue(1000)">+1,000</button>
                <button onclick="addValue(2000)">+2,000</button>
            </div>

            <section class="summary-individual">
                <label class="section-label">📊 สรุปยอดแต่ละคน</label>
                <div class="summary-chips">
                    <span class="summary-chip">มด</span>
                    <span class="summary-chip">Rex</span>
                    <span class="summary-chip">นิว</span>
                </div>
            </section>

            <div class="total-display">
                <p>ยอดรวมวันนี้</p>
                <h2 id="totalText">0 ฿</h2>
                <span id="unitText">0 ขีด</span>
            </div>

            <section class="history-section">
                <h3 class="section-label">📋 ประวัติการเบิก</h3>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>เวลา</th>
                                <th>ผู้เบิก/คืน</th>
                                <th>ประเภท</th>
                                <th>จำนวน</th>
                                <th>ขีด</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
        
        <footer class="footer-note">
            5 ขีด = 1,000 บาท • กด 🔄 รีเซ็ตเพื่อจบเกมส์และเริ่มใหม่
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>

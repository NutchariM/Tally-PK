<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tally-PK</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=12.0">
</head>
<body>

    <div class="app-container">
        <header class="main-header">
            <h1>Tally-PK</h1>
            <nav class="tab-nav">
                <button class="tab-item active" id="btn-record" onclick="location.hash='record'">บันทึก</button>
                <button class="tab-item" id="btn-summary" onclick="location.hash='summary'">สรุปรายคน</button>
                <button class="tab-item" id="btn-log" onclick="location.hash='log'">ประวัติ</button>
            </nav>
        </header>

        <main class="content-area">
            <section id="tab-record" class="tab-content active">
                <div class="input-card">
                    <div class="form-group">
                        <label class="label">ชื่อผู้ทำรายการ</label>
                        <input type="text" id="userName" class="main-input" placeholder="ใส่ชื่อตรงนี้...">
                    </div>

                    <div class="action-toggle">
                        <button id="modeWithdraw" class="toggle-btn active" onclick="setMode('withdraw')">เบิกเงิน</button>
                        <button id="modeReturn" class="toggle-btn" onclick="setMode('return')">คืนเงิน</button>
                    </div>

                    <div id="withdraw-section">
                        <div class="quick-grid">
                            <button class="btn-amt" onclick="saveEntry(200)">200</button>
                            <button class="btn-amt" onclick="saveEntry(400)">400</button>
                            <button class="btn-amt" onclick="saveEntry(600)">600</button>
                            <button class="btn-amt" onclick="saveEntry(1000)">1000</button>
                        </div>
                    </div>

                    <div id="return-section" style="display: none;">
                        <div class="flex-input">
                            <input type="number" id="returnAmount" class="main-input" placeholder="ยอดคืน...">
                            <button class="btn-save" onclick="handleReturn()">บันทึกคืน</button>
                        </div>
                    </div>
                </div>

                <div id="recent-history-area" style="display: none; margin-top: 25px;">
                    <h3 class="section-title">รายการล่าสุด</h3>
                    <div class="table-card">
                        <table class="history-table">
                            <thead>
                                <tr><th>เวลา</th><th>ชื่อ</th><th>ยอด (฿)</th><th>ขีด</th></tr>
                            </thead>
                            <tbody id="historyBody"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <section id="tab-summary" class="tab-content">
                <div id="summaryList"></div>
                <button class="btn-end-round" onclick="endRound()">จบยอดและเริ่มรอบใหม่</button>
            </section>

            <section id="tab-log" class="tab-content">
                <div class="filter-bar">
                    <input type="date" id="logDateFilter" onchange="renderLog()">
                </div>
                <div id="logList"></div>
                <button class="btn-reset" onclick="nuclearReset()">ล้างข้อมูลถาวร</button>
            </section>
        </main>

        <footer class="footer-summary" id="footer-total">
            <div class="footer-flex">
                <p>ยอดรวมรอบนี้</p>
                <h2 id="grandTotal">0 ฿</h2>
            </div>
        </footer>
    </div>

    <script type="module" src="js/script.js?v=12.0"></script>
</body>
</html>

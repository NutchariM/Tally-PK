<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tally Chart</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        input {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button.delete {
            background: #ef4444;
        }

        button.delete:hover {
            background: #dc2626;
        }

        button.reset {
            background: #f59e0b;
        }

        button.reset:hover {
            background: #d97706;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: #f8f9fa;
            padding: 16px;
            text-align: left;
            font-weight: 600;
            color: #495057;
            border-bottom: 2px solid #dee2e6;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #e9ecef;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .tally-marks {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            letter-spacing: 2px;
        }

        .count {
            font-size: 18px;
            font-weight: 600;
            color: #495057;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }

        .empty-state p {
            font-size: 18px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Tally Chart</h1>
        
        <div class="controls">
            <input type="text" id="itemInput" placeholder="ใส่ชื่อรายการ..." />
            <button onclick="addItem()">➕ เพิ่มรายการ</button>
            <button class="reset" onclick="resetAll()">🔄 ล้างทั้งหมด</button>
        </div>

        <div id="tableContainer"></div>
    </div>

    <script>
        let items = [];

        function renderTable() {
            const container = document.getElementById('tableContainer');
            
            if (items.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>ยังไม่มีรายการ</p>
                        <p>เริ่มต้นด้วยการเพิ่มรายการใหม่ด้านบน</p>
                    </div>
                `;
                return;
            }

            const tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>รายการ</th>
                            <th>Tally Marks</th>
                            <th>จำนวน</th>
                            <th>การจัดการ</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${items.map((item, index) => `
                            <tr>
                                <td>${item.name}</td>
                                <td><span class="tally-marks">${getTallyMarks(item.count)}</span></td>
                                <td><span class="count">${item.count}</span></td>
                                <td>
                                    <div class="action-buttons">
                                        <button onclick="increment(${index})">+</button>
                                        <button onclick="decrement(${index})">-</button>
                                        <button class="delete" onclick="deleteItem(${index})">🗑️ ลบ</button>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            
            container.innerHTML = tableHTML;
        }

        function getTallyMarks(count) {
            const groups = Math.floor(count / 5);
            const remainder = count % 5;
            
            let marks = '𝍸 '.repeat(groups); // ขีดทับ 5 ขีด
            marks += '| '.repeat(remainder); // ขีดเดี่ยว
            
            return marks.trim() || '-';
        }

        function addItem() {
            const input = document.getElementById('itemInput');
            const name = input.value.trim();
            
            if (name === '') {
                alert('กรุณาใส่ชื่อรายการ');
                return;
            }
            
            if (items.some(item => item.name === name)) {
                alert('รายการนี้มีอยู่แล้ว');
                return;
            }
            
            items.push({ name, count: 0 });
            input.value = '';
            renderTable();
        }

        function increment(index) {
            items[index].count++;
            renderTable();
        }

        function decrement(index) {
            if (items[index].count > 0) {
                items[index].count--;
                renderTable();
            }
        }

        function deleteItem(index) {
            if (confirm(`ต้องการลบ "${items[index].name}" ใช่หรือไม่?`)) {
                items.splice(index, 1);
                renderTable();
            }
        }

        function resetAll() {
            if (confirm('ต้องการล้างข้อมูลทั้งหมดใช่หรือไม่?')) {
                items = [];
                renderTable();
            }
        }

        // กด Enter เพื่อเพิ่มรายการ
        document.getElementById('itemInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addItem();
            }
        });

        // แสดงตารางครั้งแรก
        renderTable();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกขีด</title>
    <link rel="stylesheet" href="css/style.css"> </head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="header-left">
                <h1>📊 ระบบบันทึกขีด</h1>
                <span>อัตราส่วน: 200 ฿ = 1 ขีด</span>
            </div>
        </header>

        <main class="content">
            <section class="section">
                <label class="section-label">👤 เลือกผู้เบิก/คืน</label>
                <div class="chip-group">
                    <button class="chip active" onclick="selectUser('มด', this)">มด</button>
                    <button class="chip" onclick="selectUser('Rex', this)">Rex</button>
                    <button class="chip" onclick="selectUser('นิว', this)">นิว</button>
                    <button class="chip btn-add-user">+</button>
                </div>
            </section>

            <div class="action-toggle">
                <button id="typeWithdraw" class="toggle-item active" onclick="changeType('withdraw')">เบิกเงิน</button>
                <button id="typeReturn" class="toggle-item" onclick="changeType('return')">คืนเงิน</button>
            </div>

            <div class="action-area">
                <button id="btnQuickWithdraw" class="btn-main-action" onclick="saveData(200)">
                    บันทึกเบิกเงิน <strong>+1 ขีด (200 ฿)</strong>
                </button>
                <div id="returnInputWrapper" class="input-wrapper" style="display: none;">
                    <input type="number" id="returnAmount" placeholder="ระบุเงินที่คืน" inputmode="numeric">
                    <button class="btn-save-return" onclick="handleReturnSave()">บันทึกคืนเงิน</button>
                </div>
            </div>

            <section class="individual-summary">
                <label class="section-label">📋 ยอดคงเหลือรายคน</label>
                <div class="user-cards">
                    <div class="user-card">
                        <span class="user-name">มด</span>
                        <div class="user-total"><span id="val-มด">0</span> ขีด</div>
                        <small id="baht-มด">0 ฿</small>
                    </div>
                    <div class="user-card">
                        <span class="user-name">Rex</span>
                        <div class="user-total"><span id="val-Rex">0</span> ขีด</div>
                        <small id="baht-Rex">0 ฿</small>
                    </div>
                    <div class="user-card">
                        <span class="user-name">นิว</span>
                        <div class="user-total"><span id="val-นิว">0</span> ขีด</div>
                        <small id="baht-นิว">0 ฿</small>
                    </div>
                </div>
            </section>

            <div class="total-display">
                <p>รวมยอดทั้งกอง</p>
                <h2 id="totalUnit">0 ขีด</h2>
                <span id="totalBaht">0 ฿</span>
            </div>

            <section class="history-section">
                <h3 class="section-label">📜 ประวัติล่าสุด</h3>
                <table>
                    <thead>
                        <tr>
                            <th>เวลา</th>
                            <th>ชื่อ</th>
                            <th>ประเภท</th>
                            <th>ขีด</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </section>
        </main>
    </div>
    <script src="js/script.js"></script> </body>
</html>
